name: Mantis Security Scan

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  security-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run Mantis Scanner
        env:
          CF_ACCESS_CLIENT_ID: ${{ secrets.MANTIS_CF_CLIENT_ID }}
          CF_ACCESS_CLIENT_SECRET: ${{ secrets.MANTIS_CF_SECRET }}
        run: |
          docker run --rm \
            -e CF_ACCESS_CLIENT_ID \
            -e CF_ACCESS_CLIENT_SECRET \
            -v ${{ github.workspace }}:/scan:ro \
            registry.digitalocean.com/ai-sast/scanner:latest \
            --path /scan \
            --output json \
            --post-results https://api.mantiseu.com/api/scans \
            --api-key ${{ secrets.MANTIS_API_KEY }}
